name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # The eval gate isn't on PyPI yet — install it from source.
          pip install "ninja-harness @ git+https://github.com/gagans23/ninja-harness.git"
          pip install pytest ruff
          pip install -e . --no-deps
      - name: Lint
        run: ruff check agent_os/ tests/ examples/
      - name: Test
        run: pytest -q
      - name: Smoke test the command surface
        run: |
          agent-os cmd "/ping"
          agent-os cmd "/health"
          agent-os cmd "/audit"
